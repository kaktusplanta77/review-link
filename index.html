<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maps → Review Link</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5; color: #222; min-height: 100vh;
      display: flex; flex-direction: column;
    }
    header { background: #fff; padding: 40px 24px; text-align: center; border-bottom: 3px solid #1a73e8; }
    header h1 { font-size: 28px; font-weight: 800; }
    header h1 span { color: #1a73e8; }
    header p { color: #666; margin-top: 4px; font-size: 15px; }
    .container { flex: 1; max-width: 640px; margin: 0 auto; padding: 40px 24px; width: 100%; }
    label { font-weight: 600; font-size: 15px; display: block; margin-bottom: 8px; }
    .input-row { display: flex; gap: 10px; }
    .input-row input {
      flex: 1; padding: 14px 18px; border: 2px solid #ddd; border-radius: 12px;
      font-size: 15px; outline: none;
    }
    .input-row input:focus { border-color: #1a73e8; }
    .input-row button {
      padding: 14px 28px; background: #1a73e8; color: #fff; border: none;
      border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer;
      white-space: nowrap;
    }
    .input-row button:hover { background: #1557b0; }
    .input-row button:disabled { opacity: 0.5; }
    .result-box {
      margin-top: 24px; padding: 20px; border-radius: 14px;
      background: #fff; border: 2px dashed #ddd;
      min-height: 80px;
    }
    .result-box.has-result { border-style: solid; border-color: #a5d6a7; background: #e8f5e9; }
    .result-box.has-error { border-style: solid; border-color: #ef9a9a; background: #ffebee; }
    .result-box .placeholder { color: #aaa; font-size: 14px; text-align: center; padding-top: 18px; }
    .result-box .review-link {
      font-size: 14px; word-break: break-all; background: #fff;
      padding: 10px 14px; border-radius: 8px; border: 1px solid #e0e0e0; margin-top: 8px;
    }
    .result-box .copy-btn {
      margin-top: 10px; padding: 8px 18px; background: #fff; border: 1px solid #1a73e8;
      color: #1a73e8; border-radius: 8px; font-size: 13px; font-weight: 600;
      cursor: pointer;
    }
    .result-box .copy-btn:hover { background: #1a73e8; color: #fff; }
    .result-box .copy-btn.copied { background: #2e7d32; border-color: #2e7d32; color: #fff; }
    .result-box .label { font-size: 12px; color: #666; font-weight: 500; }
    .result-box .error-text { color: #c62828; font-size: 14px; }
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(0,0,0,0.1); border-top-color: #1a73e8;
      border-radius: 50%; animation: spin 0.6s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: #888; font-size: 14px; }
    footer { text-align: center; padding: 20px; font-size: 13px; color: #999; }
  </style>
</head>
<body>
<header>
  <h1><span>maps</span> → review link</h1>
  <p>Konvertera en Google Maps-länk till en recensionslänk</p>
</header>
<div class="container">
  <label for="urlInput">Klistra in din Maps-länk</label>
  <div class="input-row">
    <input id="urlInput" type="url" placeholder="maps.app.goo.gl/... eller full Maps-URL">
    <button id="convertBtn" onclick="convert()">Convert</button>
  </div>

  <div id="resultBox" class="result-box">
    <div class="placeholder">Klistra in en Maps-URL ovan och tryck Convert</div>
  </div>
</div>
<footer>100% gratis · ingen registrering</footer>

<script>
function extractPlaceId(url) {
  const patterns = [
    url.match(/!1s([A-Za-z0-9_\-]+)!/)?.[1],
    url.match(/[?&]placeid=([A-Za-z0-9_\-]+)/)?.[1],
    url.match(/1s([A-Za-z0-9_\-]+):0x/)?.[1]
  ];
  return patterns.find(Boolean) || null;
}

function showLoading() {
  const box = document.getElementById('resultBox');
  box.className = 'result-box';
  box.innerHTML = '<div class="loading-text"><span class="spinner"></span> Följer redirect...</div>';
}

function showPlaceholder() {
  const box = document.getElementById('resultBox');
  box.className = 'result-box';
  box.innerHTML = '<div class="placeholder">Klistra in en Maps-URL ovan och tryck Convert</div>';
}

function showResult(placeId, reviewUrl) {
  if (!reviewUrl) reviewUrl = 'https://search.google.com/local/writereview?placeid=' + placeId;
  const box = document.getElementById('resultBox');
  box.className = 'result-box has-result';
  box.innerHTML = '<div class="label">Recensionslänk</div>' +
    '<div class="review-link" id="reviewLink">' + reviewUrl + '</div>' +
    '<button class="copy-btn" onclick="copyLink()">📋 Kopiera</button>' +
    '<div style="margin-top:8px;font-size:12px;color:#888;">Place ID: ' + placeId + '</div>';
}

function showError(msg) {
  const box = document.getElementById('resultBox');
  box.className = 'result-box has-error';
  box.innerHTML = '<div class="error-text">❌ ' + msg + '</div>' +
    '<div style="margin-top:8px;font-size:13px;color:#888;">Öppna Maps-länken i din webbläsare och kopiera hela adressen från adressfältet.</div>';
}

function copyLink() {
  const el = document.getElementById('reviewLink');
  if (!el) return;
  navigator.clipboard.writeText(el.textContent).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = '✅ Kopierad!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '📋 Kopiera';
      btn.classList.remove('copied');
    }, 2000);
  });
}

async function convert() {
  const input = document.getElementById('urlInput');
  const btn = document.getElementById('convertBtn');
  const url = input.value.trim();

  if (!url) { showPlaceholder(); return; }

  // Försök client-side först
  let placeId = extractPlaceId(url);
  if (placeId) { showResult(placeId); return; }

  // API för goo.gl-kortlänkar
  showLoading();
  btn.disabled = true;
  btn.textContent = '...';

  try {
    const res = await fetch('/api/convert?url=' + encodeURIComponent(url));
    const data = await res.json();
    if (data.success && data.reviewUrl) {
      showResult(data.placeId, data.reviewUrl);
    } else {
      showError(data.error || 'Kunde inte hitta Place ID');
    }
  } catch (err) {
    showError('Kunde inte följa länken');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Convert';
  }
}

document.getElementById('urlInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') convert();
});
</script>
</body>
</html>
